# https://github.com/EdenEast/nightfox.nvim/blob/main/lua/nightfox/palette/nightfox.lua
palette = 'nightfox'

[palettes.nightfox]
color_fg0     = '#d6d6d7' # Lighter fg
color_fg1     = '#cdcecf' # Default fg
color_bg0     = '#131a24' # Dark bg (status line and float)
color_bg1     = '#192330' # Default bg
color_bg3     = '#29394f' # Lighter bg (cursor line)

color_blue    = '#719cd6' # Blue
color_blue1   = '#86ABDC' # Blue +0.15
color_blue2   = '#6085B6' # Blue -0.15

color_green   = '#81b29a' # Green
color_green2  = '#6E9783' # Green -0.15

color_yellow  = '#dbc074' # Yellow
color_yellow2 = '#BAA363' # Yellow -0.15

color_orange  = '#f4a261' # Orange
color_orange2 = '#CF8A52' # Orange -0.15

color_aqua    = '#63cdcf' # Cyan
color_purple  = '#9d79d6' # Magenta
color_red     = '#c94f6d' # Red
color_red2    = '#AB435D' # Red -0.15

color_fg        = '#cdcecf' # Default fg
#color_userhost  = '#6085B6' # Blue -0.15
#color_directory = '#6E9783' # Green -0.15
#color_git       = '#BAA363' # Yellow -0.15
color_userhost  = '#2f4159'
color_directory = '#3A5045' # Green -0.55
color_git       = '#635634' # Yellow -0.55
color_lang      = '#6E492C' # Orange -0.55
color_env       = '#5A2431' # Red -0.55
color_time      = '#192330' # Default bg

[os]
disabled = false
style = "bg:color_userhost fg:color_fg"

[os.symbols]
Windows = "¾░ı▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
AOSC = "´îü"
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = "´åù"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "´î¬"

[username]
show_always = true
style_user = "bg:color_userhost fg:color_fg"
style_root = "bg:color_userhost fg:color_fg"
format = '[ $user]($style)'

[hostname]
ssh_only = false
style = "bg:color_userhost fg:color_fg"
format = '[@$hostname ]($style)'

[directory]
style = "fg:color_fg bg:color_directory"
format = "[ $path ]($style)"
truncation_length = 8
#truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éİ"
style = "bg:color_git"
format = '[[ $symbol $branch ](fg:color_fg bg:color_git)]($style)'

[git_status]
style = "bg:color_git"
format = '[[($all_status$ahead_behind )](fg:color_fg bg:color_git)]($style)'

[nodejs]
symbol = "¯£İ"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[c]
symbol = "¯İŞ "
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[cpp]
symbol = "¯İØ "
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[rust]
symbol = "¯Ş¿"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[golang]
symbol = "¯İğ"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[php]
symbol = "¯İê"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[java]
symbol = "¯ëû"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[kotlin]
symbol = "¯İ┤"
style = "bg:color_lang"
