"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ ](bg:color_userhost)\
$os\
$username\
$hostname\
[¯é░](fg:color_userhost bg:color_directory)\
$directory\
[¯é░](fg:color_directory bg:color_git)\
$git_branch\
$git_status\
[¯é░](fg:color_git bg:color_lang)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:color_lang bg:color_env)\
