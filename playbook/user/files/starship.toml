"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ ](bg:color_userhost)\
$os\
$username\
$hostname\
[Ņé░](fg:color_userhost bg:color_directory)\
$directory\
[Ņé░](fg:color_directory bg:color_git)\
$git_branch\
$git_status\
[Ņé░](fg:color_git bg:color_lang)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:color_lang bg:color_env)\
$docker_context\
$conda\
$pixi\
[Ņé░ ](fg:color_env)\
$line_break$character"""

# https://github.com/EdenEast/nightfox.nvim/blob/main/lua/nightfox/palette/nightfox.lua
palette = 'nightfox'

[palettes.nightfox]
color_fg0     = '#d6d6d7' # Lighter fg
color_fg1     = '#cdcecf' # Default fg
color_bg0     = '#131a24' # Dark bg (status line and float)
color_bg1     = '#192330' # Default bg
color_bg3     = '#29394f' # Lighter bg (cursor line)

color_blue    = '#719cd6' # Blue
color_blue1   = '#86ABDC' # Blue +0.15
color_blue2   = '#6085B6' # Blue -0.15

color_green   = '#81b29a' # Green
color_green2  = '#6E9783' # Green -0.15

color_yellow  = '#dbc074' # Yellow
color_yellow2 = '#BAA363' # Yellow -0.15

color_orange  = '#f4a261' # Orange
color_orange2 = '#CF8A52' # Orange -0.15

color_aqua    = '#63cdcf' # Cyan
color_purple  = '#9d79d6' # Magenta
color_red     = '#c94f6d' # Red
color_red2    = '#AB435D' # Red -0.15

color_fg        = '#cdcecf' # Default fg
color_userhost  = '#6085B6' # Blue -0.15
color_directory = '#6E9783' # Green -0.15
color_git       = '#BAA363' # Yellow -0.15
color_lang      = '#CF8A52' # Orange -0.15
color_env       = '#AB435D' # Red -0.15
color_time      = '#192330' # Default bg

[os]
disabled = false
style = "bg:color_userhost fg:color_fg"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
AOSC = "’īü"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "’ī¬"

[username]
show_always = true
style_user = "bg:color_userhost fg:color_fg"
style_root = "bg:color_userhost fg:color_fg"
format = '[ $user]($style)'

[hostname]
ssh_only = false
style = "bg:color_userhost fg:color_fg"
format = '[@$hostname$ssh_symbol ]($style)'

[directory]
style = "fg:color_fg bg:color_directory"
format = "[ $path ]($style)"
truncation_length = 8
#truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:color_git"
format = '[[ $symbol $branch ](fg:color_fg bg:color_git)]($style)'

[git_status]
style = "bg:color_git"
format = '[[($all_status$ahead_behind )](fg:color_fg bg:color_git)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[c]
symbol = "Ņś× "
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[cpp]
symbol = "ŅśØ "
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[php]
symbol = "Ņśł"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[java]
symbol = "Ņē¢"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[python]
symbol = "Ņśå"
style = "bg:color_lang"
format = '[[ $symbol( $version) ](fg:color_fg bg:color_lang)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:color_env"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_env)]($style)'

[conda]
style = "bg:color_env"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_env)]($style)'

[pixi]
style = "bg:color_env"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg bg:color_env)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_time"
format = '[[ ’É║ $time ](fg:color_fg bg:color_time)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:color_green)'
error_symbol = '[ŌØ»](bold fg:color_red)'
vimcmd_symbol = '[ŌØ«](bold fg:color_blue)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:color_green)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:color_green)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:color_purple)'
