# prefixキーをC-zに変更する
set -g prefix C-z

# C-bのキーバインドを解除する
unbind C-b

# キーストロークのディレイを減らす
set -sg escape-time 1

# ウィンドウのインデックスを1から始める
set -g base-index 1

# ペインのインデックスを1から始める
setw -g pane-base-index 1

# 設定ファイルをリロードする
#bind r source-file ~/.tmux.conf \; display "Reloaded!"

# C-z zでtmux内のプログラムにC-zを送る
bind z send-prefix

bind C-z last-window
bind C-n next-window
bind C-p previous-window

# v でペインを縦に分割する
bind v split-window -h

# s でペインを横に分割する
bind s split-window -v

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# バッファをクリアする
#bind -n C-l send-keys -R C-l \; clear-history

# マウス操作を有効にする
setw -g mouse

# 256色端末を使用する
set -g default-terminal "tmux-256color"
#set -g default-terminal "screen-256color"
#set -as terminal-overrides ',xterm-256color:Tc'

# https://github.com/EdenEast/nightfox.nvim/blob/main/extra/nightfox/nightfox.tmux
set -g mode-style "fg=#131a24,bg=#aeafb0"
set -g message-style "fg=#131a24,bg=#aeafb0"
set -g message-command-style "fg=#131a24,bg=#aeafb0"
set -g pane-border-style "fg=#aeafb0"
set -g pane-active-border-style "fg=#719cd6"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#aeafb0,bg=#131a24"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
accent_fg='#aeafb0'
accent_bg='#2f4159'
datetime_fg='#71839b'
datetime_bg='#131a24'
set -g status-left "#[fg=$accent_fg,bg=$accent_bg,nobold] #S #[fg=$accent_bg,bg=#131a24,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=$datetime_fg,bg=$datetime_bg,nobold,nounderscore,noitalics]#[fg=$datetime_fg,bg=$datetime_bg] %Y-%m-%d %H:%M #[fg=$accent_bg,bg=$datetime_bg,nobold,nounderscore,noitalics]#[fg=$accent_fg,bg=$accent_bg,nobold] #h "
setw -g window-status-activity-style "underscore,fg=#71839b,bg=#131a24"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#71839b,bg=#131a24"
setw -g window-status-format "#[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]#[default] #I:#W #[fg=#131a24,bg=#131a24,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#131a24,bg=#aeafb0,nobold,nounderscore,noitalics]#[fg=#131a24,bg=#aeafb0,bold] #I:#W #[fg=#aeafb0,bg=#131a24,nobold,nounderscore,noitalics]"

## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on

set-option -g default-shell /bin/bash
set-option -g default-command /bin/bash

set-option -g history-limit 50000

