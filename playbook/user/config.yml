---
- hosts: all
  tasks:
    # ~/.config
    - name: Create symbolic links to config directories
      ansible.builtin.file:
        src: "{{ playbook_dir }}/files/{{ item }}"
        dest: "~/.config/{{ item }}"
        state: link
      loop:
        - tmux
        - peco

    # ~/
    - name: Create a symbolic link to files
      ansible.builtin.file:
        src: "{{ playbook_dir }}/files/{{ item }}"
        dest: "~/{{ item }}"
        state: link
      loop:
        - .gitconfig
        - .ExifTool_config
    
    # .profile
    - name: Create .profile
      ansible.builtin.file:
        path: ~/.profile
        state: touch
    
    - name: Update .profile for sourcing enhancd/init.sh
      ansible.builtin.blockinfile:
        path: ~/.profile
        block: "source /opt/enhancd/init.sh"
    
    # .bashrc
    - name: Update bashrc
      ansible.builtin.blockinfile:
        path: ~/.bashrc
        block: "{{ lookup('ansible.builtin.file', './files/.bashrc') }}"

