---
- hosts: all
  tasks:

    - name: Install fcitx5
      ansible.builtin.apt:
        pkg:
          - fcitx5 
          - fcitx5-mozc 
          - fcitx5-config-qt
          - fcitx5-configtool
          - fcitx5-frontend-gtk3
          #- fcitx5-frontend-qt
          - gnome-tweaks # for auto startup
        state: present
        update_cache: false
      when: ansible_distribution_version == "26.04"

    - name: Set input method
      shell: im-config -n fcitx5
      changed_when: false
      when: ansible_distribution_version == "26.04"
